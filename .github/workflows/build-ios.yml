name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'

    - name: Install CocoaPods
      run: |
        pod install
      working-directory: ./ios

    - name: Build iOS app
      run: |
        xcodebuild -workspace ios/RepoStore.xcworkspace -scheme RepoStore -configuration Debug -sdk iphonesimulator build

    - name: Upload iOS build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-debug
        path: ios/build/Debug-iphonesimulator/RepoStore.app
